categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: '🧰 Maintenance'
    labels:
      - 'maintenance'
      - 'dependencies'
  - title: '📖 Documentation'
    labels:
      - 'documentation'
sort-by: 'merged_at'
sort-direction: 'descending'
change-template: '- $TITLE ([#$NUMBER]($URL)) @$AUTHOR'
no-changes-template: '- No changes'
template: |
  ## Changes

  $CHANGES
